<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 220px;
      font-family: 'Segoe UI', Arial, sans-serif;
      padding: 15px;
      text-align: center;
      background-color: #1a1a1a;
      color: #ffffff;
      border-radius: 10px;
      transition: background-color 0.3s, color 0.3s;
    }
    /* LIGHT MODE OVERRIDES */
    body.light-mode {
      background-color: #ffffff;
      color: #111111;
    }
    body.light-mode h3 {
      color: #e60000;
    }
    body.light-mode .timer-section {
      color: #555555;
    }
    body.light-mode input {
      background-color: #eeeeee;
      border: 1px solid #cccccc;
      color: #111111;
    }
    /* BASE LAYOUT */
    h3 {
      margin-top: 0;
      margin-bottom: 12px;
      font-size: 18px;
      letter-spacing: 0.5px;
      color: #ff3333;
    }
    button {
      width: 100%;
      padding: 12px;
      background-color: #ff3333;
      color: #ffffff;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      font-size: 14px;
      cursor: pointer;
      box-shadow: 0 4px 6px rgba(0,0,0,0.2);
    }
    .timer-section {
      margin-top: 18px;
      font-size: 12px;
      color: #cccccc;
    }
    input {
      width: 45px;
      padding: 4px;
      text-align: center;
      background-color: #333333;
      border: 1px solid #555555;
      border-radius: 4px;
      color: white;
      font-weight: bold;
    }
    #countdownDisplay {
      margin-top: 15px;
      font-weight: bold;
      font-size: 15px;
      color: #00cc44;
    }

    .toggle-container {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 20px;
      font-size: 12px;
      font-weight: bold;
    }
    .switch {
      position: relative;
      display: inline-block;
      width: 36px;
      height: 20px;
    }
    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: #ff3333; 
      transition: .3s;
      border-radius: 20px;
    }
    .slider:before {
      position: absolute;
      content: "";
      height: 14px;
      width: 14px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: .3s;
      border-radius: 50%;
    }
    input:checked + .slider {
      background-color: #00cc44; 
    }
    input:checked + .slider:before {
      transform: translateX(16px);
    }
  </style>
</head>
<body>

  <h3>AlphaScroll 🚀</h3>
  
  <button id="startBtn">Activate Auto-Scroll</button>

  <div class="timer-section">
    <label>Stop after <input type="number" id="minutesInput" min="1" placeholder="∞"> mins</label>
    <div style="font-size: 10px; color: #888888; margin-top: 5px;">(Leave blank to scroll forever)</div>
  </div>

  <div id="countdownDisplay"></div>

  <!-- Centered sliding switch row -->
  <div class="toggle-container">
    <span>Dark Mode</span>
    <label class="switch">
      <input type="checkbox" id="themeToggleCheckbox">
      <span class="slider"></span>
    </label>
  </div>

  <script src="popup.js"></script>
</body>
</html>
